<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body { margin:0; }

.banner {
  width:800px;
  height:200px;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position:absolute;
  z-index:5;
  transition: all 1.2s ease;
}

.logoStart {
  width:800px;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

.logoEnd {
  width:170px;
  top:auto;
  left:auto;
  right:20px;
  bottom:20px;
  transform:none;
}

/* OVERLAY */
.overlay {
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:100%;
  background:rgba(0,80,40,0.75);
  z-index:2;
  transition:right 1s ease;
}

.overlayShow { right:0; }

/* TEXT */
.textWrap {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
  z-index:3;
}

.text {
  position:absolute;
  color:#fff;
  font-size:36px;
  font-weight:bold;
  max-width:650px;
  padding:0 40px;
  opacity:0;
}

.fade {
  animation:fadeScale 2.5s ease forwards;
}

@keyframes fadeScale {
  0% { transform:scale(1.4); opacity:0; }
  20% { opacity:1; }
  80% { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(0.9); }
}

.fadeZoom {
  animation:fadeZoom 4.5s ease forwards;
}

@keyframes fadeZoom {
  0% { transform:scale(1.2); opacity:0; }
  20% { opacity:1; }
  75% { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(2); }
}

.cta {
  font-size:22px;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="banner" id="banner">
  <img src="SPAX-logo-NY.jpg" class="logo logoStart" id="logo">
  <div class="overlay" id="overlay"></div>
  <div class="textWrap" id="wrap"></div>
</div>

<script>

const link = "mailto:kim@odsgard.dk?subject=SPAX%20produkter&body=Hej%0D%0A%0D%0AJeg%20er%20forhandler%20og%20vil%20gerne%20kontaktes%20om%20SPAX%20produkter.%0D%0A%0D%0AMed%20venlig%20hilsen";

document.getElementById('banner').onclick = function(){
  try { window.top.location.href = link; }
  catch(e){ window.open(link); }
};

const wrap = document.getElementById("wrap");
const logo = document.getElementById("logo");
const overlay = document.getElementById("overlay");

let timers = []; // 🔥 vigtig

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

/* CLEAR ALL */
function clearTimers(){
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

/* RESET */
function reset(){
  wrap.innerHTML = "";
  overlay.className = "overlay";
  logo.className = "logo logoStart";
}

/* START */
function start(){

  clearTimers();
  reset();

  /* repaint */
  void logo.offsetWidth;

  timers.push(setTimeout(()=>{
    logo.classList.replace("logoStart","logoEnd");
  },100));

  let startDelay = 3200;
  let delay = 2000;

  texts.forEach((t,i)=>{
    timers.push(setTimeout(()=>showText(t), startDelay + i*delay));
  });

  /* overlay */
  timers.push(setTimeout(()=>{
    overlay.classList.add("overlayShow");
  }, startDelay + texts.length*delay));

  /* 50 mio */
  timers.push(setTimeout(()=>{
    showBig("Vi producerer over 50 millioner skruer dagligt.");
  }, startDelay + texts.length*delay + 1000));

  /* CTA – MEGET længere */
  timers.push(setTimeout(()=>{
    showCTA("Vil du forhandle SPAX, kontakt Søren Dagø på 51 23 31 50 - soren.dago@spax.com - www.spax.com");
  }, startDelay + texts.length*delay + 6500));

  /* LOOP – efter CTA er HELT færdig */
  timers.push(setTimeout(()=>{
    start(); // 🔥 ren restart
  }, startDelay + texts.length*delay + 18000));
}

/* helpers */
function showText(txt){
  const el = create(txt);
  el.classList.add("fade");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showBig(txt){
  const el = create(txt);
  el.classList.add("fadeZoom");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showCTA(txt){
  const el = create(txt);
  el.classList.add("fade","cta");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function create(txt){
  const el = document.createElement("div");
  el.className = "text";
  el.innerText = txt;
  return el;
}

/* START */
start();

</script>

</body>
</html>
