<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.banner{
  width:100%;
  max-width:620px;
  aspect-ratio:620 / 200;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo{
  position:absolute;
  top:50%;
  left:50%;
  width:100%;
  transform:translate(-50%, -50%) scale(1);
  transform-origin:center;
  z-index:5;
  opacity:1;

  transition:
    transform 1.6s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 1.2s ease;
}

/* lille logo */
.logoSmall{
  transform:translate(135%, 75%) scale(0.14);
}

/* skjul */
.logoFade{
  opacity:0;
}

/* OVERLAY */
.overlay{
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:100%;
  background:rgba(0,80,40,0.75);
  z-index:2;
  transition:right 0.8s ease;
}
.overlayShow{ right:0; }

/* TEXT */
.textWrap{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:3;
}

.text{
  position:absolute;
  color:#fff;
  font-size:clamp(18px,4vw,34px);
  font-weight:bold;
  max-width:90%;
  opacity:0;
}

/* STANDARD */
.fade{
  animation:fadeScale 2s ease forwards;
}
@keyframes fadeScale{
  0%{transform:scale(1.3);opacity:0;}
  20%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;}
}

/* PRODUKTION */
.bigText{
  animation:bigSequence 6.5s ease forwards;
}
@keyframes bigSequence{
  0%{opacity:0;transform:scale(1.2);}
  15%{opacity:1;transform:scale(1);}
  70%{opacity:1;}
  100%{opacity:0;transform:scale(1.8);}
}

/* CTA – INGEN FADE */
.cta{
  font-size:clamp(14px,2.2vw,18px);
  line-height:1.6;
  white-space:pre-line;
  opacity:1;
}
</style>
</head>

<body>

<div class="banner" id="banner">
  <img src="SPAX-logo-NY.jpg" class="logo" id="logo">
  <div class="overlay" id="overlay"></div>
  <div class="textWrap" id="wrap"></div>
</div>

<script>

let timers=[];

const texts=[
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

function clearAll(){
  timers.forEach(t=>clearTimeout(t));
  timers=[];
}

function reset(){
  document.getElementById("wrap").innerHTML="";
  document.getElementById("overlay").className="overlay";

  const logo=document.getElementById("logo");
  logo.className="logo";
  logo.offsetHeight;
}

function start(){

  clearAll();
  reset();

  const logo=document.getElementById("logo");
  const overlay=document.getElementById("overlay");

  /* LOGO → ned */
  timers.push(setTimeout(()=>{
    logo.classList.add("logoFade");

    setTimeout(()=>{
      logo.classList.remove("logoFade");
      logo.classList.add("logoSmall");
    },400);

  },1500));

  let startDelay=3200;
  let delay=1500;

  texts.forEach((t,i)=>{
    timers.push(setTimeout(()=>showText(t), startDelay+i*delay));
  });

  timers.push(setTimeout(()=>{
    overlay.classList.add("overlayShow");
  }, startDelay+texts.length*delay));

  timers.push(setTimeout(()=>{
    showBig("Vi producerer over 50 millioner skruer dagligt.");
  }, startDelay+texts.length*delay+800));

  timers.push(setTimeout(()=>{
    showCTA("Vil du forhandle SPAX,\nkontakt Søren Dagø på 51 23 31 50\nsoren.dago@spax.com - www.spax.com");
  }, startDelay+texts.length*delay+7500));

  /* 🔥 LOOP (logo op + overlay væk usynligt) */
  timers.push(setTimeout(()=>{

    /* logo op */
    logo.classList.remove("logoSmall");
    logo.classList.add("logoFade");

    setTimeout(()=>{
      logo.classList.remove("logoFade");

      /* overlay fjernes mens logo dækker */
      overlay.classList.remove("overlayShow");

    },400);

    /* pause hvor logo fylder */
    setTimeout(()=>{
      start();
    },1500);

  }, startDelay+texts.length*delay+17000));
}

/* helpers */
function showText(txt){
  const wrap=document.getElementById("wrap");
  const el=document.createElement("div");
  el.className="text fade";
  el.innerText=txt;
  wrap.innerHTML="";
  wrap.appendChild(el);
}

function showBig(txt){
  const wrap=document.getElementById("wrap");
  const el=document.createElement("div");
  el.className="text bigText";
  el.innerText=txt;
  wrap.innerHTML="";
  wrap.appendChild(el);
}

function showCTA(txt){
  const wrap=document.getElementById("wrap");
  const el=document.createElement("div");
  el.className="text cta";
  el.innerText=txt;
  wrap.innerHTML="";
  wrap.appendChild(el);
}

window.addEventListener("load",()=>{
  document.getElementById("banner").onclick=function(){
    window.open("https://www.spax.com/sv-sv.html","_blank");
  };
  start();
});

</script>

</body>
</html>
