<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body { margin: 0; }

.banner {
  width: 800px;
  height: 200px;
  position: relative;
  overflow: hidden;
  font-family: Arial, sans-serif;
  cursor: pointer;
  background: url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position: absolute;
  right: 20px;
  bottom: 20px;
  width: 760px; /* næsten hele banner */
  opacity: 0;
  transform: scale(1);
  animation: logoAnim 4s ease forwards;
}

@keyframes logoAnim {
  0% {
    width: 800px;
    right: 0;
    bottom: 0;
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  100% {
    width: 180px;
    right: 20px;
    bottom: 20px;
    opacity: 1;
  }
}

/* TEKST */
.textContainer {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  pointer-events: none;
}

.text {
  position: absolute;
  color: #fff;
  font-size: 38px;
  font-weight: bold;
  opacity: 0;
}

/* animation */
.animateText {
  animation: textAnim 2.5s ease forwards;
}

@keyframes textAnim {
  0% {
    transform: scale(1.8);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  80% {
    opacity: 1;
    transform: scale(1);
  }
  100% {
    opacity: 0;
    transform: scale(0.9);
  }
}

/* CTA */
.cta {
  font-size: 24px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

</style>
</head>

<body>

<div class="banner" onclick="clickBanner()">

  <!-- LOGO -->
  <img src="SPAX-logo-NY.jpg" class="logo">

  <!-- TEKST -->
  <div class="textContainer" id="textContainer"></div>

</div>

<script>

function clickBanner() {
  window.location.href = "mailto:kim@odsgard.dk?subject=SPAX%20produkter&body=Hej%0D%0A%0D%0AJeg%20er%20forhandler%20og%20vil%20gerne%20kontaktes%20om%20SPAX%20produkter.%0D%0A%0D%0AMed%20venlig%20hilsen";
}

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

const container = document.getElementById("textContainer");

let delay = 2200;

/* LOOP TEKSTER */
texts.forEach((txt, i) => {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "text animateText";
    el.innerText = txt;
    container.innerHTML = "";
    container.appendChild(el);
  }, i * delay + 1000);
});

/* STOR TEKST */
setTimeout(() => {
  const el = document.createElement("div");
  el.className = "text animateText";
  el.innerText = "Vi producerer over 50 millioner skruer dagligt.";
  container.innerHTML = "";
  container.appendChild(el);
}, texts.length * delay + 1000);

/* CTA */
setTimeout(() => {
  const el = document.createElement("div");
  el.className = "cta";
  el.innerText = "Kontakt Søren Dagø på 51 23 31 50 - denmark.info@spax.com - www.spax.com";
  container.innerHTML = "";
  container.appendChild(el);
}, texts.length * delay + 3500);

</script>

</body>
</html>
