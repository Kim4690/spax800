<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body { margin:0; }

.banner {
  width:800px;
  height:200px;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position:absolute;
  width:800px;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

/* LOGO ANIMATION */
.logoStart {
  animation:logoMove 4s ease forwards;
}

@keyframes logoMove {
  0% {
    width:800px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
  }
  100% {
    width:170px;
    top:auto;
    left:auto;
    right:20px;
    bottom:20px;
    transform:none;
  }
}

/* TEKST */
.textWrap {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
}

.text {
  position:absolute;
  color:#fff;
  font-size:36px;
  font-weight:bold;
  max-width:700px;
  opacity:0;
}

/* STANDARD ANIMATION */
.show {
  animation:fadeScale 2.6s ease forwards;
}

@keyframes fadeScale {
  0% {
    transform:scale(1.6);
    opacity:0;
  }
  20% { opacity:1; }
  80% {
    opacity:1;
    transform:scale(1);
  }
  100% {
    opacity:0;
    transform:scale(0.9);
  }
}

/* ZOOM OUT (til 50 mio) */
.zoomOut {
  animation:zoomOut 2s ease forwards;
}

@keyframes zoomOut {
  0% {
    transform:scale(1);
    opacity:1;
  }
  100% {
    transform:scale(2);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="banner" id="banner"
data-link="mailto:kim@odsgard.dk?subject=SPAX%20produkter&body=Hej%0D%0A%0D%0AJeg%20er%20forhandler%20og%20vil%20gerne%20kontaktes%20om%20SPAX%20produkter.%0D%0A%0D%0AMed%20venlig%20hilsen">

  <img src="SPAX-logo-NY.jpg" class="logo" id="logo">

  <div class="textWrap" id="wrap"></div>

</div>

<script>

/* CLICK */
document.getElementById('banner').addEventListener('click', function(){
  window.top.location.href = this.getAttribute('data-link');
});

const wrap = document.getElementById("wrap");
const logo = document.getElementById("logo");

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

function startBanner() {

  wrap.innerHTML = "";
  logo.className = "logo logoStart";

  let startDelay = 4500;
  let delay = 2200;

  /* STEP 1: små tekster */
  texts.forEach((t, i) => {
    setTimeout(() => showText(t), startDelay + i * delay);
  });

  /* STEP 2: 50 mio */
  setTimeout(() => {
    const el = createText("Vi producerer over 50 millioner skruer dagligt.");
    wrap.innerHTML = "";
    wrap.appendChild(el);
    el.style.opacity = "1";

    setTimeout(() => {
      el.classList.add("zoomOut");
    }, 3000);

  }, startDelay + texts.length * delay);

  /* STEP 3: CTA */
  setTimeout(() => {
    const el = createText(
      "Kontakt Søren Dagø på 51 23 31 50\nsoren.dago@spax.com - www.spax.com"
    );
    el.style.whiteSpace = "pre-line";
    el.style.opacity = "1";

    wrap.innerHTML = "";
    wrap.appendChild(el);

  }, startDelay + texts.length * delay + 5000);

  /* LOOP */
  setTimeout(() => {
    startBanner();
  }, startDelay + texts.length * delay + 10000);
}

/* helpers */
function showText(txt) {
  const el = createText(txt);
  el.classList.add("show");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function createText(txt) {
  const el = document.createElement("div");
  el.className = "text";
  el.innerText = txt;
  return el;
}

/* START */
startBanner();

</script>

</body>
</html>
