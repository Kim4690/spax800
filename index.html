<script>

let timers = [];

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

function clearAll(){
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

function reset(){
  const logo = document.getElementById("logo");
  const overlay = document.getElementById("overlay");
  const wrap = document.getElementById("wrap");

  wrap.innerHTML = "";
  overlay.className = "overlay";

  /* 🔥 reset logo korrekt */
  logo.className = "logo logoStart";

  /* force repaint */
  logo.offsetHeight;
}

function start(){

  clearAll();
  reset();

  const logo = document.getElementById("logo");
  const overlay = document.getElementById("overlay");

  /* start logo animation */
  timers.push(setTimeout(()=>{
    logo.classList.replace("logoStart","logoEnd");
  }, 200));

  let startDelay = 2200;
  let delay = 2000;

  texts.forEach((t,i)=>{
    timers.push(setTimeout(()=>showText(t), startDelay + i*delay));
  });

  /* overlay */
  timers.push(setTimeout(()=>{
    overlay.classList.add("overlayShow");
  }, startDelay + texts.length*delay));

  /* 50 mio */
  timers.push(setTimeout(()=>{
    showBig("Vi producerer over 50 millioner skruer dagligt.");
  }, startDelay + texts.length*delay + 800));

  /* CTA */
  timers.push(setTimeout(()=>{
    showCTA("Vil du forhandle SPAX, kontakt Søren Dagø på 51 23 31 50 - soren.dago@spax.com - www.spax.com");
  }, startDelay + texts.length*delay + 7000));

  /* LOOP */
  timers.push(setTimeout(()=>{
    start();
  }, startDelay + texts.length*delay + 15000));
}

/* helpers */
function showText(txt){
  const wrap = document.getElementById("wrap");
  const el = create(txt);
  el.classList.add("fade");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showBig(txt){
  const wrap = document.getElementById("wrap");
  const el = create(txt);
  el.classList.add("bigText");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showCTA(txt){
  const wrap = document.getElementById("wrap");
  const el = create(txt);
  el.classList.add("cta","text");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function create(txt){
  const el = document.createElement("div");
  el.className = "text";
  el.innerText = txt;
  return el;
}

start();

</script>
