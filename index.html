<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body { margin:0; }

.banner {
  width:800px;
  height:200px;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position:absolute;
  z-index:5;
}

/* RESET (vigtigt for loop) */
.logoReset {
  width:800px;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

/* ANIMATION */
.logoAnim {
  animation:logoMove 4s ease forwards;
}

@keyframes logoMove {
  0% {
    width:800px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
  }
  100% {
    width:170px;
    right:20px;
    bottom:20px;
    top:auto;
    left:auto;
    transform:none;
  }
}

/* OVERLAY */
.overlay {
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:100%;
  background:rgba(0, 80, 40, 0.75);
  z-index:2;
}

.overlayIn {
  animation:overlayMove 1s ease forwards;
}

@keyframes overlayMove {
  to { right:0; }
}

/* TEKST */
.textWrap {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
  z-index:3;
}

.text {
  position:absolute;
  color:#fff;
  font-size:36px;
  font-weight:bold;
  max-width:650px;
  padding:0 40px;
  opacity:0;
}

.cta {
  font-size:22px;
  line-height:1.4;
}

/* STANDARD */
.show {
  animation:fadeScale 2.6s ease forwards;
}

@keyframes fadeScale {
  0% { transform:scale(1.6); opacity:0; }
  20% { opacity:1; }
  80% { transform:scale(1); opacity:1; }
  100% { transform:scale(0.9); opacity:0; }
}

/* 50 mio */
.zoomOut {
  animation:zoomOut 2s ease forwards;
}

@keyframes zoomOut {
  to {
    transform:scale(2);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="banner" id="banner">

  <img src="SPAX-logo-NY.jpg" class="logo" id="logo">

  <div class="overlay" id="overlay"></div>

  <div class="textWrap" id="wrap"></div>

</div>

<script>

/* CLICK FIX */
document.getElementById('banner').addEventListener('click', function(){
  window.top.location.href = "mailto:kim@odsgard.dk?subject=SPAX%20produkter&body=Hej%0D%0A%0D%0AJeg%20er%20forhandler%20og%20vil%20gerne%20kontaktes%20om%20SPAX%20produkter.%0D%0A%0D%0AMed%20venlig%20hilsen";
});

const wrap = document.getElementById("wrap");
const logo = document.getElementById("logo");
const overlay = document.getElementById("overlay");

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

function startBanner() {

  /* RESET ALT */
  wrap.innerHTML = "";
  overlay.className = "overlay";
  overlay.style.right = "-100%";

  /* 🔥 vigtigt: reset logo korrekt */
  logo.className = "logo logoReset";

  setTimeout(() => {
    logo.className = "logo logoAnim";
  }, 50);

  let startDelay = 4500;
  let delay = 2200;

  /* TEKSTER */
  texts.forEach((t, i) => {
    setTimeout(() => showText(t), startDelay + i * delay);
  });

  /* 50 mio + overlay */
  setTimeout(() => {
    overlay.classList.add("overlayIn");

    const el = createText("Vi producerer over 50 millioner skruer dagligt.");
    wrap.innerHTML = "";
    wrap.appendChild(el);
    el.style.opacity = "1";

    setTimeout(() => {
      el.classList.add("zoomOut");
    }, 3500);

  }, startDelay + texts.length * delay);

  /* CTA */
  setTimeout(() => {
    const el = createText(
      "Kontakt Søren Dagø på 51 23 31 50\nsoren.dago@spax.com - www.spax.com"
    );
    el.classList.add("cta");
    el.style.whiteSpace = "pre-line";
    el.style.opacity = "1";

    wrap.innerHTML = "";
    wrap.appendChild(el);

  }, startDelay + texts.length * delay + 5000);

  /* LOOP */
  setTimeout(() => {
    startBanner();
  }, startDelay + texts.length * delay + 12000);
}

/* helpers */
function showText(txt) {
  const el = createText(txt);
  el.classList.add("show");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function createText(txt) {
  const el = document.createElement("div");
  el.className = "text";
  el.innerText = txt;
  return el;
}

/* START */
startBanner();

</script>

</body>
</html>
