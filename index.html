<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body {
  margin: 0;
}

.banner {
  width: 800px;
  height: 200px;
  position: relative;
  overflow: hidden;
  font-family: Arial, sans-serif;
  cursor: pointer;
  background: url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position: absolute;
  right: 20px;
  bottom: 20px;
  transform: scale(3);
  opacity: 0;
  animation: logoMove 3s ease forwards;
}

@keyframes logoMove {
  0% {
    transform: scale(3) translate(0, 0);
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: scale(1) translate(0, 0);
    opacity: 1;
  }
}

/* TEKST CENTER */
.textContainer {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
  font-weight: bold;
  pointer-events: none;
}

.text {
  position: absolute;
  opacity: 0;
  max-width: 700px;
}

/* tekst animation */
.showText {
  animation: textAnim 2.5s ease forwards;
}

@keyframes textAnim {
  0% {
    transform: scale(1.6);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  80% {
    opacity: 1;
    transform: scale(1);
  }
  100% {
    opacity: 0;
    transform: scale(0.9);
  }
}

/* stor tekst */
.bigText {
  font-size: 34px;
}

/* CTA */
.cta {
  font-size: 24px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

</style>
</head>

<body>

<div class="banner" onclick="clickBanner()">

  <!-- LOGO -->
  <img src="SPAX-logo-NY.jpg" class="logo" width="220">

  <!-- TEKST -->
  <div class="textContainer" id="textContainer"></div>

</div>

<script>

function clickBanner() {
  window.location.href = "mailto:kim@odsgard.dk?subject=SPAX%20produkter&body=Hej%0D%0A%0D%0AJeg%20er%20forhandler%20og%20vil%20gerne%20kontaktes%20om%20SPAX%20produkter.%0D%0A%0D%0AMed%20venlig%20hilsen";
}

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

const container = document.getElementById("textContainer");

let delay = 2000;

texts.forEach((txt, i) => {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "text bigText showText";
    el.innerText = txt;
    container.innerHTML = "";
    container.appendChild(el);
  }, i * delay);
});

/* stor tekst */
setTimeout(() => {
  const el = document.createElement("div");
  el.className = "text bigText showText";
  el.innerText = "Vi producerer over 50 millioner skruer dagligt.";
  container.innerHTML = "";
  container.appendChild(el);
}, texts.length * delay);

/* CTA */
setTimeout(() => {
  const el = document.createElement("div");
  el.className = "cta";
  el.innerText = "Kontakt Søren Dagø 51 23 31 50<br>
denmark.info@spax.com - www.spax.com";
  container.innerHTML = "";
  container.appendChild(el);
}, texts.length * delay + 3000);

</script>

</body>
</html>
