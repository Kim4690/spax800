<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body { margin:0; }

.banner {
  width:800px;
  height:200px;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position:absolute;
  width:800px;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  animation:logoAnim 4s ease forwards;
}

@keyframes logoAnim {
  0% {
    width:800px;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
  }
  100% {
    width:170px;
    top:auto;
    left:auto;
    right:20px;
    bottom:20px;
    transform:none;
  }
}

/* TEKST */
.textWrap {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
}

.text {
  position:absolute;
  color:#fff;
  font-size:36px;
  font-weight:bold;
  max-width:700px;
  opacity:0;
}

.show {
  animation:fadeScale 2.6s ease forwards;
}

@keyframes fadeScale {
  0% {
    transform:scale(1.6);
    opacity:0;
  }
  20% { opacity:1; }
  80% {
    opacity:1;
    transform:scale(1);
  }
  100% {
    opacity:0;
    transform:scale(0.9);
  }
}
</style>
</head>

<body>

<div class="banner" data-link="mailto:kim@odsgard.dk?subject=SPAX%20produkter&body=Hej%0D%0A%0D%0AJeg%20er%20forhandler%20og%20vil%20gerne%20kontaktes%20om%20SPAX%20produkter.%0D%0A%0D%0AMed%20venlig%20hilsen">

  <img src="SPAX-logo-NY.jpg" class="logo">

  <div class="textWrap" id="textWrap"></div>

</div>

<script>

/* KLIK – virker i alle systemer */
document.querySelector('.banner').addEventListener('click', function() {
  window.top.location.href = this.getAttribute('data-link');
});


const wrap = document.getElementById('textWrap');

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

let start = 4500; // starter efter logo
let delay = 2300;

/* LILLE TEKSTER */
texts.forEach((t, i) => {
  setTimeout(() => {
    showText(t);
  }, start + (i * delay));
});

/* 50 mio (længere) */
setTimeout(() => {
  showStatic("Vi producerer over 50 millioner skruer dagligt.", 3500);
}, start + texts.length * delay);

/* CTA (længere + samme stil) */
setTimeout(() => {
  showStatic("Kontakt Søren Dagø ved at klikke på banneret", 4000);
}, start + texts.length * delay + 3500);


/* FUNCTIONS */

function showText(txt) {
  const el = document.createElement("div");
  el.className = "text show";
  el.innerText = txt;

  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showStatic(txt, duration) {
  const el = document.createElement("div");
  el.className = "text";
  el.style.opacity = "1";
  el.innerText = txt;

  wrap.innerHTML = "";
  wrap.appendChild(el);

  setTimeout(() => {
    el.style.opacity = "0";
  }, duration);
}

</script>

</body>
</html>
