<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
body { margin:0; }

.banner {
  width:800px;
  height:200px;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* LOGO */
.logo {
  position:absolute;
  z-index:5;
  transition: all 1s ease;
}

.logoStart {
  width:800px;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

.logoEnd {
  width:170px;
  right:20px;
  bottom:20px;
  top:auto;
  left:auto;
  transform:none;
}

/* OVERLAY */
.overlay {
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:100%;
  background:rgba(0,80,40,0.75);
  z-index:2;
  transition:right 0.8s ease;
}

.overlayShow { right:0; }

/* TEXT */
.textWrap {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
  z-index:3;
}

.text {
  position:absolute;
  color:#fff;
  font-size:36px;
  font-weight:bold;
  max-width:650px;
  padding:0 40px;
  opacity:0;
}

/* STANDARD */
.fade {
  animation:fadeScale 2.2s ease forwards;
}

@keyframes fadeScale {
  0% { transform:scale(1.3); opacity:0; }
  20% { opacity:1; }
  80% { opacity:1; }
  100% { opacity:0; }
}

/* 50 mio – NY */
.bigText {
  animation:bigSequence 6s ease forwards;
}

@keyframes bigSequence {
  0% { opacity:0; transform:scale(1.2); }
  15% { opacity:1; transform:scale(1); }
  60% { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(2); }
}

/* CTA */
.cta {
  font-size:22px;
  line-height:1.4;
  animation:ctaAnim 8s ease forwards;
}

@keyframes ctaAnim {
  0% { opacity:0; transform:scale(1.2); }
  10% { opacity:1; }
  90% { opacity:1; }
  100% { opacity:0; }
}

</style>
</head>

<body>

<div class="banner" id="banner">
  <img src="SPAX-logo-NY.jpg" class="logo logoStart" id="logo">
  <div class="overlay" id="overlay"></div>
  <div class="textWrap" id="wrap"></div>
</div>

<script>

const wrap = document.getElementById("wrap");
const logo = document.getElementById("logo");
const overlay = document.getElementById("overlay");

let timers = [];

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

function clearAll(){
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

function reset(){
  wrap.innerHTML = "";
  overlay.className = "overlay";
  logo.className = "logo logoStart";
}

function start(){

  clearAll();
  reset();

  logo.className = "logo logoStart";

  /* vigtig – lad browser tegne først */
  setTimeout(() => {
  logo.classList.replace("logoStart","logoEnd");
  }, 200);

  let startDelay = 2200;
  let delay = 2000;

  texts.forEach((t,i)=>{
    timers.push(setTimeout(()=>showText(t), startDelay + i*delay));
  });

  /* overlay */
  timers.push(setTimeout(()=>{
    overlay.classList.add("overlayShow");
  }, startDelay + texts.length*delay));

  /* 50 mio */
  timers.push(setTimeout(()=>{
    showBig("Vi producerer over 50 millioner skruer dagligt.");
  }, startDelay + texts.length*delay + 800));

  /* CTA (længere!) */
  timers.push(setTimeout(()=>{
    showCTA("Vil du forhandle SPAX, kontakt Søren Dagø på 51 23 31 50 - soren.dago@spax.com - www.spax.com");
  }, startDelay + texts.length*delay + 7000));

  /* RESTART – præcis når CTA er færdig */
  timers.push(setTimeout(()=>{
    start();
  }, startDelay + texts.length*delay + 15000));
}

/* helpers */
function showText(txt){
  const el = create(txt);
  el.classList.add("fade");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showBig(txt){
  const el = create(txt);
  el.classList.add("bigText");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showCTA(txt){
  const el = create(txt);
  el.classList.add("cta","text");
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function create(txt){
  const el = document.createElement("div");
  el.className = "text";
  el.innerText = txt;
  return el;
}

start();

</script>

</body>
</html>
