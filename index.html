<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.banner{
  width:100%;
  max-width:620px;
  aspect-ratio:620/200;
  position:relative;
  overflow:hidden;
  font-family:Arial, sans-serif;
  cursor:pointer;
  background:url('bg.jpg') center/cover no-repeat;
}

/* 🔥 LOGO – ÉT ELEMENT */
.logo{
  position:absolute;
  top:50%;
  left:50%;
  width:100%;

  transform:translate(-50%, -50%) scale(1);
  transform-origin:center;

  z-index:10;

  transition: transform 3s cubic-bezier(0.25,1,0.5,1);
}

/* 🔥 LILLE (flyttes via transform – IKKE right/bottom) */
.logoSmall{
  transform:
    translate(calc(-50% + 270px), calc(-50% + 95px))
    scale(0.14);
}

/* OVERLAY */
.overlay{
  position:absolute;
  top:0;
  right:-100%;
  width:100%;
  height:100%;
  background:rgba(0,80,40,0.75);
  z-index:2;
  transition:right 0.8s ease;
}
.overlayShow{ right:0; }

/* TEXT */
.textWrap{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:3;
}

.text{
  position:absolute;
  color:#fff;
  font-size:36px;
  font-weight:bold;
  max-width:650px;
  padding:0 40px;
  opacity:0;
}

/* STANDARD */
.fade{
  animation:fadeScale 2.2s ease forwards;
}

@keyframes fadeScale{
  0% { transform:scale(1.3); opacity:0; }
  20% { opacity:1; }
  80% { opacity:1; }
  100% { opacity:0; }
}

/* 🔥 DIN OPRINDELIGE */
.bigText{
  animation:bigSequence 6s ease forwards;
}

@keyframes bigSequence{
  0% { opacity:0; transform:scale(1.2); }
  15% { opacity:1; transform:scale(1); }
  60% { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(2); }
}

/* CTA */
.cta{
  font-size:clamp(16px,3.5vw,24px);
  line-height:1.4;
  white-space:pre-line;
  opacity:1;
}
</style>
</head>

<body>

<div class="banner" id="banner">
  <img src="SPAX-logo-NY.jpg" class="logo" id="logo">
  <div class="overlay" id="overlay"></div>
  <div class="textWrap" id="wrap"></div>
</div>

<script>

let timers=[];

const texts=[
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

const wrap=document.getElementById("wrap");
const overlay=document.getElementById("overlay");
const logo=document.getElementById("logo");

function clearAll(){
  timers.forEach(t=>clearTimeout(t));
  timers=[];
}

function reset(){
  wrap.innerHTML="";
  overlay.className="overlay";

  logo.className="logo";
  logo.offsetHeight;
}

function start(){

  clearAll();
  reset();

  /* 🔥 LOGO NED */
  timers.push(setTimeout(()=>{
    logo.classList.add("logoSmall");
  },2500));

  let startDelay=5000;
  let delay=2000;

  texts.forEach((t,i)=>{
    timers.push(setTimeout(()=>showText(t), startDelay+i*delay));
  });

  let afterWords = startDelay + texts.length*delay;

  timers.push(setTimeout(()=>{
    overlay.classList.add("overlayShow");
  }, afterWords));

  timers.push(setTimeout(()=>{
    showBig("Vi producerer over 50 millioner skruer dagligt.");
  }, afterWords + 800));

  timers.push(setTimeout(()=>{
    showCTA("Vil du forhandle SPAX,\nkontakt Søren Dagø på 51 23 31 50\nsoren.dago@spax.com - www.spax.com");
  }, afterWords + 7500));

  /* 🔥 LOGO OP (SAMME ELEMENT – FRA HJØRNET) */
  timers.push(setTimeout(()=>{

    logo.classList.remove("logoSmall");

    /* overlay fjernes først når logo er stort */
    setTimeout(()=>{
      overlay.classList.remove("overlayShow");
    },2000);

    setTimeout(()=>{
      start();
    },2500);

  }, afterWords + 14000));
}

/* helpers */
function showText(txt){
  const el=document.createElement("div");
  el.className="text fade";
  el.innerText=txt;
  wrap.innerHTML="";
  wrap.appendChild(el);
}

function showBig(txt){
  const el=document.createElement("div");
  el.className="text bigText";
  el.innerText=txt;
  wrap.innerHTML="";
  wrap.appendChild(el);
}

function showCTA(txt){
  const el=document.createElement("div");
  el.className="text cta";
  el.innerText=txt;
  wrap.innerHTML="";
  wrap.appendChild(el);
}

window.onload=function(){
  document.getElementById("banner").onclick=function(){
    window.open("https://www.spax.com/sv-sv.html","_blank");
  };
  start();
};

</script>

</body>
</html>
