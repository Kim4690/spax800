<script>

let timers = [];

const link = "https://www.spax.com/sv-sv.html";

document.querySelector(".banner").onclick = function(){
  window.open(link, "_blank");
};

const texts = [
  "Terrasseskruer",
  "Konstruktionsskruer",
  "Facadeskruer",
  "Indendørs skruer",
  "Udendørs skruer"
];

function clearAll(){
  timers.forEach(t => clearTimeout(t));
  timers = [];
}

function reset(){
  document.getElementById("wrap").innerHTML = "";
  document.getElementById("overlay").className = "overlay";

  const logo = document.getElementById("logo");
  logo.className = "logo logoStart";

  logo.offsetHeight;
}

function start(){

  clearAll();
  reset();

  const logo = document.getElementById("logo");
  const overlay = document.getElementById("overlay");

  /* logo animation */
  timers.push(setTimeout(()=>{
    logo.classList.replace("logoStart","logoEnd");
  }, 600));

  let startDelay = 2200;
  let delay = 1600;

  texts.forEach((t,i)=>{
    timers.push(setTimeout(()=>showText(t), startDelay + i*delay));
  });

  timers.push(setTimeout(()=>{
    overlay.classList.add("overlayShow");
  }, startDelay + texts.length*delay));

  timers.push(setTimeout(()=>{
    showBig("Vi producerer over 50 millioner skruer dagligt.");
  }, startDelay + texts.length*delay + 800));

  timers.push(setTimeout(()=>{
    showCTA("Vil du forhandle SPAX,\nkontakt Søren Dagø på 51 23 31 50\nsoren.dago@spax.com - www.spax.com");
  }, startDelay + texts.length*delay + 7000));

  timers.push(setTimeout(()=>{
    start();
  }, startDelay + texts.length*delay + 15000));
}

/* helpers */
function showText(txt){
  const wrap = document.getElementById("wrap");
  const el = document.createElement("div");
  el.className = "text fade";
  el.innerText = txt;
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showBig(txt){
  const wrap = document.getElementById("wrap");
  const el = document.createElement("div");
  el.className = "text bigText";
  el.innerText = txt;
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

function showCTA(txt){
  const wrap = document.getElementById("wrap");
  const el = document.createElement("div");
  el.className = "text cta";
  el.innerText = txt;
  wrap.innerHTML = "";
  wrap.appendChild(el);
}

start();

</script>
